name: Multi-Job Workflow

on: [push]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
    ubuntu:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up Go
              uses: actions/setup-go@v5.5.0
              with:
                go-version: "1.20"
            - name: Build Go binary
              run: go build -o main main.go
            - name: Run binary
              run: ./main

    windows:
        runs-on: windows-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up Go
              uses: actions/setup-go@v5.5.0
              with:
                go-version: "1.20"
            - name: Build Go binary
              run: go build -o main.exe main.go
            - name: Run binary
              run: .\main.exe
    
    macos:
        runs-on: macos-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up Go
              uses: actions/setup-go@v5.5.0
              with:
                go-version: "1.20"
            - name: Build Go binary
              run: go build -o main main.go
            - name: Run binary
              run: ./main

    cross-compile:
        runs-on: ubuntu-latest
        needs: [ubuntu,windows,macos]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up Go
              uses: actions/setup-go@v5.5.0
              with:
                go-version: "1.20"
            - name: Cross-compile for all platforms
              run: |
                echo "Cross compiling for all platforms:"
                GOOS=linux GOARCH=amd64 go build -o main-linux main.go
                GOOS=windows GOARCH=amd64 go build -o main-windows.exe main.go
                GOOS=darwin GOARCH=amd64 go build -o main-macos-intel main.go
            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                name: apps
                path: ./main*

    test-linux:
      runs-on: ubuntu-latest
      needs: cross-compile
      steps:
        - name: Download artifacts
          uses: actions/download-artifact@v4
          with:
            name: apps

        - name: Set up Go
          uses: actions/setup-go@v5.5.0
          with:
            go-version: "1.20"

        - name: Make binary executable
          run: chmod +x main*

        - name: Listing Files
          run: |
            ls -lrth
        - name: Run 
          run: ./main-linux